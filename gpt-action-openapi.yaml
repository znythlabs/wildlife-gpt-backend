openapi: "3.1.0"
info:
  title: Wildlife Documentary Engine — GPT Action
  description: >
    Save wildlife documentary episode packages generated by the
    Wildlife Documentary Engine Custom GPT. This action stores the
    structured JSON so the preview frontend can display it instantly.
  version: "1.0.0"
servers:
  - url: "https://content-generator-sage.vercel.app"
    description: Wildlife Documentary Engine — Vercel deployment

security:
  - ApiKeyAuth: []

paths:
  /api/health:
    get:
      operationId: checkHealth
      summary: Backend health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  mode:
                    type: string
                  status:
                    type: string

  /api/packages:
    post:
      operationId: saveWildlifePackage
      summary: Save a wildlife documentary episode package
      description: >
        Save one complete Wildlife Documentary Engine JSON package.
        The body must match the wildlife-package schema exactly:
        episode_title, animal, hook, summary, runtime,
        scenes (array), thumbnail_prompt, caption, hashtags, metadata.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WildlifePackage"
      responses:
        "201":
          description: Package saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  package:
                    $ref: "#/components/schemas/WildlifePackage"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  error:
                    type: string
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-action-api-key

  schemas:
    WildlifePackage:
      type: object
      required:
        - episode_title
        - animal
        - hook
        - summary
        - runtime
        - scenes
        - thumbnail_prompt
        - caption
        - hashtags
        - metadata
      properties:
        episode_title:
          type: string
        animal:
          type: string
        hook:
          type: string
        summary:
          type: string
        runtime:
          type: string
        scenes:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - scene_number
              - duration
              - narration
              - on_screen_text
              - image_prompt
              - video_prompt
              - camera_style
              - sound_design
            properties:
              scene_number:
                type: integer
              duration:
                type: string
              narration:
                type: string
              on_screen_text:
                type: string
              image_prompt:
                type: string
              video_prompt:
                type: string
              camera_style:
                type: string
              sound_design:
                type: string
            additionalProperties: false
        thumbnail_prompt:
          type: string
        caption:
          type: string
        hashtags:
          type: array
          items:
            type: string
        metadata:
          type: object
          required:
            - tone
            - format
            - style
            - target_platform
          properties:
            tone:
              type: string
            format:
              type: string
            style:
              type: string
            target_platform:
              type: string
          additionalProperties: false
      additionalProperties: false
