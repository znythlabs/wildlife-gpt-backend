openapi: "3.1.0"
info:
  title: Wildlife Documentary Engine — GPT Action v2
  description: >
    Save wildlife documentary episode packages generated by the
    Wildlife Documentary Engine Custom GPT. This action stores the
    structured JSON so the preview frontend can display it instantly.
    Uses schema_version "2.0" with nested episode_overview, hook,
    summary, qa_score, vo_script, storyboard, image_video_prompts,
    thumbnail_prompt, and social_export.
  version: "2.0.0"
servers:
  - url: "https://content-generator-sage.vercel.app"
    description: Wildlife Documentary Engine — Vercel deployment

security:
  - ApiKeyAuth: []

paths:
  /api/health:
    get:
      operationId: checkHealth
      summary: Backend health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  mode:
                    type: string
                  status:
                    type: string

  /api/packages:
    post:
      operationId: saveWildlifePackage
      summary: Save a wildlife documentary episode package (v2)
      description: >
        Save one complete Wildlife Documentary Engine JSON package.
        The body must match the v2 wildlife-package schema exactly
        with schema_version "2.0" and all nested objects.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WildlifePackage"
      responses:
        "201":
          description: Package saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  package:
                    $ref: "#/components/schemas/WildlifePackage"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  error:
                    type: string
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-action-api-key

  schemas:
    WildlifePackage:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - episode_overview
        - hook
        - summary
        - qa_score
        - vo_script
        - storyboard
        - image_video_prompts
        - thumbnail_prompt
        - social_export
      properties:
        schema_version:
          type: string
          enum: ["2.0"]
        episode_overview:
          type: object
          additionalProperties: false
          required:
            - episode_title
            - animal
            - episode_type
            - runtime
            - tone
            - format
            - visual_style
            - target_platform
            - logline
          properties:
            episode_title:
              type: string
            animal:
              type: string
            episode_type:
              type: string
            runtime:
              type: string
            tone:
              type: string
            format:
              type: string
            visual_style:
              type: string
            target_platform:
              type: string
            logline:
              type: string
        hook:
          type: object
          additionalProperties: false
          required:
            - hook_line
            - curiosity_gap
            - payoff_setup
          properties:
            hook_line:
              type: string
            curiosity_gap:
              type: string
            payoff_setup:
              type: string
        summary:
          type: object
          additionalProperties: false
          required:
            - short_summary
            - full_summary
          properties:
            short_summary:
              type: string
            full_summary:
              type: string
        qa_score:
          type: object
          additionalProperties: false
          required:
            - overall_score
            - hook_score
            - structure_score
            - visual_score
            - factuality_score
            - pacing_score
            - notes
          properties:
            overall_score:
              type: integer
              minimum: 0
              maximum: 100
            hook_score:
              type: integer
              minimum: 0
              maximum: 100
            structure_score:
              type: integer
              minimum: 0
              maximum: 100
            visual_score:
              type: integer
              minimum: 0
              maximum: 100
            factuality_score:
              type: integer
              minimum: 0
              maximum: 100
            pacing_score:
              type: integer
              minimum: 0
              maximum: 100
            notes:
              type: array
              items:
                type: string
        vo_script:
          type: object
          additionalProperties: false
          required:
            - full_script
            - lines
          properties:
            full_script:
              type: string
            lines:
              type: array
              minItems: 1
              items:
                type: object
                additionalProperties: false
                required:
                  - scene_number
                  - timestamp
                  - duration
                  - voiceover
                properties:
                  scene_number:
                    type: integer
                  timestamp:
                    type: string
                  duration:
                    type: string
                  voiceover:
                    type: string
        storyboard:
          type: object
          additionalProperties: false
          required:
            - storyboard_copy_prompt
            - panels
          properties:
            storyboard_copy_prompt:
              type: string
            panels:
              type: array
              minItems: 1
              items:
                type: object
                additionalProperties: false
                required:
                  - panel_number
                  - duration
                  - visual_beat
                  - subject_action
                  - environment
                  - camera_style
                  - lighting
                  - composition
                  - consistency_notes
                properties:
                  panel_number:
                    type: integer
                  duration:
                    type: string
                  visual_beat:
                    type: string
                  subject_action:
                    type: string
                  environment:
                    type: string
                  camera_style:
                    type: string
                  lighting:
                    type: string
                  composition:
                    type: string
                  consistency_notes:
                    type: string
        image_video_prompts:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required:
              - scene_number
              - duration
              - image_prompt
              - video_prompt
              - negative_prompt
            properties:
              scene_number:
                type: integer
              duration:
                type: string
              image_prompt:
                type: string
              video_prompt:
                type: string
              negative_prompt:
                type: string
        thumbnail_prompt:
          type: object
          additionalProperties: false
          required:
            - prompt
            - negative_prompt
          properties:
            prompt:
              type: string
            negative_prompt:
              type: string
        social_export:
          type: object
          additionalProperties: false
          required:
            - caption
            - hashtags
            - title_options
            - description
            - keywords
          properties:
            caption:
              type: string
            hashtags:
              type: array
              items:
                type: string
            title_options:
              type: array
              minItems: 1
              items:
                type: string
            description:
              type: string
            keywords:
              type: array
              items:
                type: string
